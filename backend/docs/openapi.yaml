  # ===== Agent =====
  /api/v1/agent/query:
    post:
      tags: [Agent]
      summary: AI智能体查询
      description: |
        向AI智能体发送自然语言查询请求，支持多轮对话和上下文关联。
        
        **功能说明：**
        - 支持自然语言查询设备状态、故障诊断、预测分析等
        - 多智能体协作处理复杂查询
        - 支持会话上下文，实现多轮对话
        
        **支持的查询类型：**
        - 设备状态查询：\"1号设备的温度是多少？\"
        - 故障诊断：\"设备出现异常振动，可能是什么原因？\"
        - 预测分析：\"预测CNC加工中心下周的维护需求\"
        - 数据统计：\"上周有多少设备出现故障？\"
        - 操作建议：\"如何降低设备能耗？\"
        
        **智能体类型：**
        - `DeviceAgent`: 设备状态分析
        - `PredictAgent`: 预测性维护分析
        - `AlertAgent`: 告警分析和处理
        - `CoordinatorAgent`: 查询路由和协调
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgentQuery'
            examples:
              deviceQuery:
                summary: 设备状态查询
                value:
                  query: 1号CNC加工中心的温度和振动数据如何？
                  device_id: DEV001
                  session_id: sess_abc123
              faultDiagnosis:
                summary: 故障诊断查询
                value:
                  query: 设备DEV002最近频繁出现高温告警，请分析原因并给出建议
                  device_id: DEV002
                  context:
                    alert_history: true
                    time_range: 7d
              predictionQuery:
                summary: 预测分析查询
                value:
                  query: 根据历史数据，预测DEV001设备未来一周是否需要维护
                  device_id: DEV001
                  session_id: sess_xyz789
                  context:
                    include_history: true
                    prediction_model: maintenance
      responses:
        '200':
          description: AI查询响应成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentResponse'
              examples:
                deviceStatusResponse:
                  summary: 设备状态响应
                  value:
                    session_id: sess_abc123
                    response: "1号CNC加工中心当前状态良好。温度为72.5℃，在正常范围内（上限85℃）；振动为0.8mm/s，处于正常水平。设备运行稳定，无需特别关注。"
                    agent: DeviceAgent
                    actions: []
                    timestamp: "2024-01-15T10:35:00Z"
                faultDiagnosisResponse:
                  summary: 故障诊断响应
                  value:
                    session_id: sess_def456
                    response: "设备DEV002高温告警分析完成。可能原因：1) 冷却系统效率下降；2) 环境温度升高；3) 负载过大。建议：检查冷却液流量，清洁散热器，考虑降低工作负载。"
                    agent: PredictAgent
                    actions:
                      - type: create_work_order
                        device_id: DEV002
                        priority: high
                        description: 检查冷却系统
                    timestamp: "2024-01-15T10:36:00Z"
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                emptyQuery:
                  summary: 查询内容为空
                  value:
                    error: 查询内容不能为空
                    code: EMPTY_QUERY
                invalidSession:
                  summary: 会话无效
                  value:
                    error: 会话已过期，请重新开始对话
                    code: SESSION_EXPIRED
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: AI服务处理失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                aiServiceError:
                  summary: AI服务异常
                  value:
                    error: AI服务暂时不可用，请稍后重试
                    code: AI_SERVICE_ERROR

