openapi: 3.0.3
info:
  title: Industrial AI Agent Platform API
  description: |
    工业AI代理平台API文档
    
    ## 功能模块
    - **认证**: 用户登录、注册、JWT认证
    - **设备**: 设备管理、遥测数据、设备图谱
    - **告警**: 告警规则配置、告警管理
    - **工单**: 维护工单管理
    - **通知**: 系统通知管理
    - **AI智能体**: 多智能体对话、预测分析
    - **报告**: AI报告生成
    - **黑匣子**: 故障回放数据
    - **ROI**: 投资回报统计
    
    ## 认证方式
    使用JWT Bearer Token认证：
    ```
    Authorization: Bearer <token>
    ```
  version: 1.1.0
  contact:
    name: Industrial AI Platform Team
    email: support@industrial.ai
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: 开发服务器
  - url: http://localhost:8080/api/v1
    description: API v1

tags:
  - name: Auth
    description: 用户认证接口
  - name: Devices
    description: 设备管理接口
  - name: Telemetry
    description: 遥测数据接口
  - name: Alerts
    description: 告警管理接口
  - name: Rules
    description: 告警规则接口
  - name: Agent
    description: AI智能体接口
  - name: WorkOrders
    description: 工单管理接口
  - name: Notifications
    description: 通知接口
  - name: Reports
    description: 报告接口
  - name: BlackBox
    description: 黑匣子接口
  - name: ROI
    description: ROI统计接口
  - name: Admin
    description: 管理员接口
  - name: Tenants
    description: 租户管理接口
  - name: RBAC
    description: 角色权限管理接口
  - name: Export
    description: 数据导出接口
  - name: Monitoring
    description: 系统监控接口

paths:
  # ===== Auth =====
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      description: |
        使用用户名密码登录系统，成功后返回JWT token用于后续API认证。
        
        **认证流程：**
        1. 客户端发送用户名密码
        2. 服务端验证凭据
        3. 返回JWT token和用户信息
        4. 后续请求需在Header中携带 `Authorization: Bearer <token>`
        
        **注意事项：**
        - Token有效期默认24小时
        - 连续失败5次将锁定账户15分钟
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              normalLogin:
                summary: 普通用户登录
                value:
                  username: operator1
                  password: "******"
              adminLogin:
                summary: 管理员登录
                value:
                  username: admin
                  password: "******"
      responses:
        '200':
          description: 登录成功，返回JWT token和用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                successResponse:
                  summary: 登录成功响应
                  value:
                    token: EXAMPLE_TOKEN_PLACEHOLDER
                    user:
                      id: 1
                      username: operator1
                      email: operator@factory.com
                      role: user
                      created_at: "2024-01-15T08:30:00Z"
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missingFields:
                  summary: 缺少必填字段
                  value:
                    error: 用户名和密码不能为空
                    code: INVALID_REQUEST
        '401':
          description: 认证失败，用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidCredentials:
                  summary: 凭据无效
                  value:
                    error: 用户名或密码错误
                    code: AUTH_FAILED
                accountLocked:
                  summary: 账户已锁定
                  value:
                    error: 账户已被锁定，请15分钟后重试
                    code: ACCOUNT_LOCKED
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                serverError:
                  summary: 服务异常
                  value:
                    error: 服务暂时不可用，请稍后重试
                    code: INTERNAL_ERROR

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: 用户注册
      description: |
        注册新用户账户。
        
        **注册规则：**
        - 用户名：3-50字符，仅支持字母数字下划线
        - 密码：至少6位，建议包含大小写字母和数字
        - 邮箱：需要验证格式，用于找回密码
        
        **默认权限：**
        - 新注册用户默认角色为 `user`
        - 管理员角色需要超级管理员分配
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              normalRegister:
                summary: 普通用户注册
                value:
                  username: newoperator
                  password: "SecurePass123"
                  email: operator@factory.com
              adminRegister:
                summary: 管理员注册（需要权限）
                value:
                  username: newadmin
                  password: "AdminPass456"
                  email: admin@factory.com
                  role: admin
      responses:
        '200':
          description: 注册成功，返回登录凭证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              examples:
                successRegister:
                  summary: 注册成功
                  value:
                    token: EXAMPLE_TOKEN_PLACEHOLDER
                    user:
                      id: 42
                      username: newoperator
                      email: operator@factory.com
                      role: user
                      created_at: "2024-01-15T12:00:00Z"
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidUsername:
                  summary: 用户名格式无效
                  value:
                    error: 用户名必须为3-50个字符，仅支持字母数字下划线
                    code: INVALID_USERNAME
                weakPassword:
                  summary: 密码强度不足
                  value:
                    error: 密码至少6位，建议包含大小写字母和数字
                    code: WEAK_PASSWORD
                invalidEmail:
                  summary: 邮箱格式无效
                  value:
                    error: 请输入有效的邮箱地址
                    code: INVALID_EMAIL
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                userExists:
                  summary: 用户名已被注册
                  value:
                    error: 用户名已存在
                    code: USERNAME_EXISTS
                emailExists:
                  summary: 邮箱已被注册
                  value:
                    error: 该邮箱已注册
                    code: EMAIL_EXISTS
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新Token
      description: 使用现有Token刷新获取新的Token pair
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 现有的JWT Token
      responses:
        '200':
          description: Token刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
                  token_type:
                    type: string
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 用户登出
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Logged out successfully"

  /api/v1/auth/password:
    put:
      tags: [Auth]
      summary: 修改密码
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password:
                  type: string
                  description: 当前密码
                new_password:
                  type: string
                  description: 新密码（至少12位）
                  minLength: 12
      responses:
        '200':
          description: 密码修改成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password changed successfully"
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 当前密码验证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/auth/validate:
    post:
      tags: [Auth]
      summary: 验证Token
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 要验证的JWT Token
      responses:
        '200':
          description: Token验证成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  user_id:
                    type: integer
                  username:
                    type: string
                  role:
                    type: string

  # ===== Alerts =====
  /api/v1/alerts:
    get:
      tags: [Alerts]
      summary: 告警列表
      description: 获取系统中的告警列表，支持按状态和严重程度筛选
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          description: 告警状态筛选
          schema:
            type: string
            enum: [active, acknowledged, resolved, all]
        - name: severity
          in: query
          description: 严重程度筛选
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: device_id
          in: query
          description: 设备ID筛选
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 成功获取告警列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'
                  total:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/alerts/{id}:
    get:
      tags: [Alerts]
      summary: 获取告警详情
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          description: 告警不存在

  /api/v1/alerts/{id}/resolve:
    put:
      tags: [Alerts]
      summary: 解决告警
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 告警已解决
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: integer
                  status:
                    type: string
                    example: resolved

  /api/v1/alerts/{id}/acknowledge:
    put:
      tags: [Alerts]
      summary: 确认告警
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 告警已确认
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  id:
                    type: integer
                  status:
                    type: string
                    example: acknowledged

  /api/v1/alerts/stats:
    get:
      tags: [Alerts]
      summary: 告警统计
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  active_count:
                    type: integer
                  by_severity:
                    type: object
                    properties:
                      critical:
                        type: integer
                      high:
                        type: integer
                      medium:
                        type: integer
                      low:
                        type: integer
                  by_status:
                    type: object
                    properties:
                      active:
                        type: integer
                      resolved:
                        type: integer
                      acknowledged:
                        type: integer
                  total_count:
                    type: integer

  /api/v1/alerts/report/trend:
    get:
      tags: [Alerts]
      summary: 告警趋势报告
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          schema:
            type: string
            default: 7d
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    type: string
                  trend:
                    type: array
                    items:
                      type: object

  /api/v1/alerts/report/ranking:
    get:
      tags: [Alerts]
      summary: 告警设备排名
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        device_id:
                          type: string
                        alert_count:
                          type: integer

  /api/v1/alerts/report/efficiency:
    get:
      tags: [Alerts]
      summary: 告警处理效率
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  efficiency:
                    type: object
                    properties:
                      avg_resolve_time:
                        type: number
                      ack_rate:
                        type: number

  # ===== Devices =====
  /api/v1/devices:
    get:
      tags: [Devices]
      summary: 设备列表
      description: |
        获取所有设备列表，支持分页查询。
        
        **功能说明：**
        - 返回系统中注册的所有设备信息
        - 支持分页，默认每页20条记录
        - 可用于设备监控看板和设备管理
        
        **设备状态：**
        - `online`: 在线运行
        - `offline`: 离线
        - `warning`: 告警状态
        - `maintenance`: 维护中
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码，从1开始
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          description: 每页记录数，最大100
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          description: 按状态筛选设备
          schema:
            type: string
            enum: [online, offline, warning, maintenance]
        - name: type
          in: query
          description: 按设备类型筛选
          schema:
            type: string
      responses:
        '200':
          description: 成功获取设备列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDevices'
              examples:
                deviceList:
                  summary: 设备列表示例
                  value:
                    data:
                      - id: DEV001
                        name: CNC加工中心-1号
                        type: CNC
                        location: A车间-1号线
                        status: online
                        description: 主轴加工设备
                        created_at: "2024-01-10T10:00:00Z"
                      - id: DEV002
                        name: 注塑机-A2
                        type: InjectionMolder
                        location: B车间-注塑区
                        status: warning
                        description: 注塑生产设备
                        created_at: "2024-01-10T11:00:00Z"
                    total: 156
                    page: 1
                    page_size: 20
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidPage:
                  summary: 无效页码
                  value:
                    error: 页码必须大于0
                    code: INVALID_PARAM
        '401':
          description: 未认证，Token无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                unauthorized:
                  summary: Token无效
                  value:
                    error: 未授权访问，请先登录
                    code: UNAUTHORIZED
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [Devices]
      summary: 创建设备
      description: |
        注册新设备到系统中。
        
        **设备类型说明：**
        - `CNC`: CNC加工中心
        - `InjectionMolder`: 注塑机
        - `AssemblyRobot`: 装配机器人
        - `Conveyor`: 输送带
        - `Sensor`: 传感器节点
        
        **状态说明：**
        - `online`: 设备在线，正常工作
        - `offline`: 设备离线
        - `warning`: 设备有告警
        - `maintenance`: 设备维护中
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Device'
            examples:
              cncDevice:
                summary: CNC加工中心
                value:
                  id: DEV-CNC-001
                  name: CNC加工中心-1号
                  type: CNC
                  location: A车间-1号线
                  status: online
                  description: 主轴加工设备，加工精度0.01mm
              sensorDevice:
                summary: 温度传感器
                value:
                  id: DEV-TEMP-001
                  name: 温度传感器-生产线A
                  type: Sensor
                  location: A车间-入口
                  status: online
                  description: 监控入口温度
      responses:
        '200':
          description: 设备创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              examples:
                createdDevice:
                  summary: 创建成功
                  value:
                    id: DEV-CNC-001
                    name: CNC加工中心-1号
                    type: CNC
                    location: A车间-1号线
                    status: online
                    description: 主轴加工设备，加工精度0.01mm
                    created_at: "2024-01-15T10:00:00Z"
        '400':
          description: 请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                duplicateId:
                  summary: 设备ID已存在
                  value:
                    error: 设备ID已存在
                    code: DUPLICATE_DEVICE_ID
                invalidType:
                  summary: 无效的设备类型
                  value:
                    error: 不支持的设备类型
                    code: INVALID_DEVICE_TYPE
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/devices/{id}:
    get:
      tags: [Devices]
      summary: 获取设备
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: 设备不存在
    put:
      tags: [Devices]
      summary: 更新设备
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Device'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [Devices]
      summary: 删除设备
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/v1/devices/latest:
    get:
      tags: [Telemetry]
      summary: 最新遥测数据
      description: 获取所有设备的最新遥测数据
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TelemetryData'

  /api/v1/devices/{id}/telemetry:
    get:
      tags: [Telemetry]
      summary: 设备历史数据
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: range
          in: query
          description: 时间范围 (1h, 6h, 24h, 7d, 30d)
          schema:
            type: string
            default: 1h
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
      responses:
        '200':
          description: 成功
