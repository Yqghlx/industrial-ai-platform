  # ===== ROI =====
  /api/v1/roi/stats:
    get:
      tags: [ROI]
      summary: ROI统计
      description: |
        获取投资回报率统计数据，展示平台的业务价值。
        
        **功能说明：**
        - 统计设备监控带来的效率提升
        - 计算预测性维护节省的成本
        - 展示告警响应时间改善
        - 提供投资回报率指标
        
        **计算指标说明：**
        - `predicted_savings`: 预测节省成本（元）
          - 基于减少的停机时间计算
          - 包含维护成本节省
        - `uptime_percentage`: 设备可用率（%）
          - 计算公式：运行时间 / 总时间 × 100%
        - `avg_response_time_hours`: 平均告警响应时间（小时）
          - 从告警产生到处理的平均时间
        
        **数据更新频率：**
        - 每小时更新一次统计数据
      security:
        - BearerAuth: []
      parameters:
        - name: period
          in: query
          description: 统计周期
          schema:
            type: string
            enum: [day, week, month, quarter, year]
            default: month
        - name: start_date
          in: query
          description: 开始日期（ISO 8601格式）
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          description: 结束日期（ISO 8601格式）
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 成功获取ROI统计数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ROIStats'
              examples:
                monthlyStats:
                  summary: 月度统计
                  value:
                    total_devices: 156
                    active_alerts: 12
                    open_work_orders: 8
                    resolved_issues: 45
                    predicted_savings: 128500.00
                    uptime_percentage: 98.5
                    avg_response_time_hours: 2.3
                    period:
                      start: "2024-01-01"
                      end: "2024-01-31"
                    breakdown:
                      maintenance_savings: 85000.00
                      downtime_savings: 32000.00
                      energy_savings: 11500.00
                quarterlyStats:
                  summary: 季度统计
                  value:
                    total_devices: 156
                    active_alerts: 8
                    open_work_orders: 5
                    resolved_issues: 142
                    predicted_savings: 425000.00
                    uptime_percentage: 99.1
                    avg_response_time_hours: 1.8
                    period:
                      start: "2024-01-01"
                      end: "2024-03-31"
                    breakdown:
                      maintenance_savings: 280000.00
                      downtime_savings: 120000.00
                      energy_savings: 25000.00
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidPeriod:
                  summary: 无效的日期范围
                  value:
                    error: 开始日期不能晚于结束日期
                    code: INVALID_DATE_RANGE
        '401':
          description: 未认证
