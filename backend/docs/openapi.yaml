  # ===== Telemetry (Public) =====
  /api/v1/devices/telemetry:
    post:
      tags: [Telemetry]
      summary: 遥测数据摄入
      description: |
        边缘设备上报遥测数据接口（公开接口，无需认证）。
        
        **功能说明：**
        - 接收边缘设备实时采集的传感器数据
        - 数据将存储到时序数据库
        - 自动触发配置的告警规则检测
        - 支持批量数据上报
        
        **数据字段说明：**
        - `temperature`: 温度（℃）
        - `pressure`: 压力（MPa）
        - `vibration`: 振动（mm/s）
        - `humidity`: 湿度（%）
        - `power`: 功率（kW）
        
        **数据保留策略：**
        - 原始数据保留30天
        - 聚合数据保留1年
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelemetryData'
            examples:
              temperatureData:
                summary: 温度传感器数据
                value:
                  device_id: DEV001
                  timestamp: "2024-01-15T10:30:00Z"
                  temperature: 85.5
                  status: normal
                  message: "正常运行"
              fullTelemetry:
                summary: 完整遥测数据
                value:
                  device_id: DEV002
                  timestamp: "2024-01-15T10:30:00Z"
                  temperature: 72.3
                  pressure: 1.5
                  vibration: 0.8
                  humidity: 45.2
                  power: 15.6
                  status: normal
              batchData:
                summary: 批量上报示例
                value:
                  device_id: DEV003
                  timestamp: "2024-01-15T10:30:00Z"
                  temperature: 95.2
                  pressure: 2.1
                  vibration: 2.5
                  status: warning
                  message: "温度接近阈值上限"
      responses:
        '200':
          description: 数据摄入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  triggered_alerts:
                    type: array
                    items:
                      type: object
                      properties:
                        rule_id:
                          type: integer
                        rule_name:
                          type: string
                        severity:
                          type: string
              examples:
                successNoAlert:
                  summary: 成功无告警
                  value:
                    success: true
                    message: 数据已保存
                    triggered_alerts: []
                successWithAlert:
                  summary: 成功并触发告警
                  value:
                    success: true
                    message: 数据已保存，触发1条告警
                    triggered_alerts:
                      - rule_id: 5
                        rule_name: 高温告警
                        severity: high
        '400':
          description: 请求数据格式错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidDevice:
                  summary: 设备ID无效
                  value:
                    error: 设备ID不存在
                    code: DEVICE_NOT_FOUND
                invalidTimestamp:
                  summary: 时间戳格式错误
                  value:
                    error: 时间戳格式无效，请使用ISO 8601格式
                    code: INVALID_TIMESTAMP
                missingRequired:
                  summary: 缺少必填字段
                  value:
