          description: 创建成功

  /api/v1/roles/{id}:
    get:
      tags: [RBAC]
      summary: 获取角色详情
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
    put:
      tags: [RBAC]
      summary: 更新角色
      description: 更新角色（管理员权限）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleUpdate'
      responses:
        '200':
          description: 更新成功
    delete:
      tags: [RBAC]
      summary: 删除角色
      description: 删除角色（管理员权限）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/v1/roles/{id}/permissions:
    post:
      tags: [RBAC]
      summary: 分配权限给角色
      description: 为角色分配权限（管理员权限）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [permission_id]
              properties:
                permission_id:
                  type: integer
      responses:
        '200':
          description: 分配成功

  /api/v1/permissions:
    get:
      tags: [RBAC]
      summary: 权限列表
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  /api/v1/users/{id}/roles:
    get:
      tags: [RBAC]
      summary: 获取用户角色
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
    post:
      tags: [RBAC]
      summary: 为用户分配角色
      description: 为用户分配角色（管理员权限）
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role_id]
              properties:
                role_id:
                  type: integer
      responses:
        '200':
          description: 分配成功

  # ===== Telemetry =====
  /api/v1/telemetry/latest:
    get:
      tags: [Telemetry]
      summary: 最新遥测数据
      description: 获取所有设备的最新遥测数据
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TelemetryData'

  /api/v1/telemetry/device/{id}:
    get:
      tags: [Telemetry]
      summary: 设备遥测数据
      description: 获取指定设备的遥测数据
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TelemetryData'
                  device_id:
                    type: string

  /api/v1/telemetry/status:
    get:
      tags: [Telemetry]
      summary: 遥测系统状态
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatus'

  # ===== Export =====
  /api/v1/reports/devices/export:
    get:
      tags: [Export]
      summary: 导出设备数据
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json, xlsx]
            default: csv
      responses:
        '200':
          description: 导出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'

  /api/v1/reports/alerts/export:
    get:
      tags: [Export]
      summary: 导出告警数据
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json, xlsx]
            default: csv
        - name: status
          in: query
          schema:
            type: string
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: 导出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Alert'

  /api/v1/reports/roi/export:
    get:
      tags: [Export]
      summary: 导出ROI数据
      security:
        - BearerAuth: []
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json, xlsx]
            default: csv
        - name: period
          in: query
          schema:
            type: string
      responses:
        '200':
          description: 导出成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ROIStats'

  # ===== Monitoring =====
  /cache/status:
    get:
      tags: [Monitoring]
      summary: 缓存状态
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  backend_type:
                    type: string
                  available:
                    type: boolean
                  stats:
                    type: object

  /ws/stats:
    get:
      tags: [Monitoring]
      summary: WebSocket统计
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: integer
                  messages_sent:
                    type: integer
                  messages_received:
                    type: integer

  # ===== Health =====
  /health:
    get:
      tags: [Auth]
      summary: 健康检查
      responses:
        '200':
          description: 系统健康
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  database:
                    type: string
                  db_latency:
                    type: integer
                  timestamp:
                    type: string

  # ===== WebSocket =====
  /ws:
    get:
      tags: [Telemetry]
      summary: WebSocket连接
      description: 实时数据推送
      responses:
        '200':
          description: WebSocket连接成功

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      description: 错误响应
      required: [error]
      properties:
        error:
          type: string
          description: 错误消息
          example: 用户名或密码错误
        code:
          type: string
          description: 错误代码，用于程序处理
          enum:
            - INVALID_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - DEVICE_NOT_FOUND
            - INVALID_TIMESTAMP
            - MISSING_FIELD
            - AUTH_FAILED
            - ACCOUNT_LOCKED
            - SESSION_EXPIRED
            - EMPTY_QUERY
            - AI_SERVICE_ERROR
            - STORAGE_ERROR
            - INTERNAL_ERROR
          example: AUTH_FAILED

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 用户名，3-50字符
          minLength: 3
          maxLength: 50
          example: operator1
        password:
          type: string
          description: 用户密码
          minLength: 6
          example: "******"
      description: 用户登录请求

    RegisterRequest:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
          description: 用户名，3-50字符，仅支持字母数字下划线
          minLength: 3
          maxLength: 50
          pattern: '^[a-zA-Z0-9_]+$'
          example: newoperator
        password:
          type: string
          description: 密码，至少6位，建议包含大小写字母和数字
          minLength: 6
          example: "SecurePass123"
        email:
          type: string
          description: 邮箱地址，用于找回密码
          format: email
          example: operator@factory.com
        role:
          type: string
          description: 用户角色，默认为user
          enum: [user, admin]
          default: user
      description: 用户注册请求

    LoginResponse:
      type: object
      description: 登录响应，包含JWT token和用户信息
      properties:
        token:
          type: string
          description: JWT认证令牌，有效期24小时
          example: EXAMPLE_TOKEN_PLACEHOLDER
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      description: 用户信息
      properties:
        id:
          type: integer
          description: 用户唯一标识
          example: 1
        username:
          type: string
          description: 用户名
          example: operator1
        email:
          type: string
          description: 邮箱地址
          example: operator@factory.com
        role:
          type: string
          description: 用户角色
          enum: [user, admin]
          example: user
        created_at:
          type: string
          format: date-time
          description: 账户创建时间
          example: "2024-01-15T08:30:00Z"

    Device:
      type: object
      description: 设备信息
      required: [id, name, type]
      properties:
        id:
          type: string
          description: 设备唯一标识
          example: DEV001
        name:
          type: string
          description: 设备名称
          example: CNC加工中心-1号
        type:
          type: string
          description: 设备类型
          enum: [CNC, InjectionMolder, AssemblyRobot, Conveyor, Sensor, Other]
          example: CNC
        location:
          type: string
          description: 设备位置
          example: A车间-1号线
        status:
          type: string
          description: 设备状态
          enum: [online, offline, warning, maintenance]
          example: online
        description:
          type: string
          description: 设备描述
          example: 主轴加工设备，加工精度0.01mm
        created_at:
          type: string
          format: date-time
          description: 设备创建时间
          example: "2024-01-10T10:00:00Z"

    PaginatedDevices:
      type: object
      description: 分页设备列表
      properties:
        data:
          type: array
          description: 设备列表
          items:
            $ref: '#/components/schemas/Device'
        total:
          type: integer
          description: 总记录数
          example: 156
        page:
          type: integer
          description: 当前页码
          example: 1
        page_size:
          type: integer
          description: 每页记录数
          example: 20

    TelemetryData:
      type: object
      required: [device_id]
      description: |
        遥测数据，包含设备传感器采集的各项指标。
        
        **单位说明：**
        - temperature: 温度（℃）
        - pressure: 压力（MPa）
        - vibration: 振动（mm/s）
        - humidity: 湿度（%）
        - power: 功率（kW）
      properties:
        device_id:
          type: string
          description: 设备唯一标识
          example: DEV001
        timestamp:
          type: string
          format: date-time
          description: 数据采集时间（ISO 8601格式），默认为当前时间
          example: "2024-01-15T10:30:00Z"
        temperature:
          type: number
          description: 温度（℃）
          example: 75.5
        pressure:
          type: number
          description: 压力（MPa）
          example: 1.5
        vibration:
          type: number
          description: 振动（mm/s）
          example: 0.8
        humidity:
          type: number
          description: 湿度（%）
          example: 45.2
        power:
          type: number
          description: 功率（kW）
          example: 15.6
        status:
          type: string
          description: 设备运行状态
          enum: [normal, warning, error, maintenance]
          example: normal
        message:
          type: string
          description: 附加消息或备注
          example: "设备运行正常"

    DeviceStats:
      type: object
      description: 设备统计数据
      properties:
        device_id:
          type: string
          description: 设备唯一标识
          example: DEV001
        avg_temperature:
          type: number
          description: 平均温度（℃）
          example: 72.5
        avg_pressure:
          type: number
          description: 平均压力（MPa）
          example: 1.3
        avg_vibration:
          type: number
          description: 平均振动（mm/s）
          example: 0.65
        max_temperature:
          type: number
          description: 最高温度（℃）
          example: 85.2
        max_pressure:
          type: number
          description: 最高压力（MPa）
          example: 2.1
        max_vibration:
          type: number
          description: 最高振动（mm/s）
          example: 1.2
        data_points:
          type: integer
          description: 数据点数量
          example: 1440

    DeviceGraph:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
              status:
                type: string
        links:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              type:
                type: string

    AlertRule:
      type: object
      description: 告警规则配置
      required: [name, metric, operator, threshold]
      properties:
        id:
          type: integer
          description: 规则ID（创建时自动生成）
          example: 5
        name:
          type: string
          description: 规则名称
          example: 高温告警规则
        device_type:
          type: string
          description: 适用设备类型（空表示所有类型）
          example: CNC
        metric:
          type: string
          description: 监控指标
          enum: [temperature, pressure, vibration, humidity, power]
          example: temperature
        operator:
          type: string
          description: 比较运算符
          enum: ['>', '>=', '<', '<=', '==', '!=']
          example: '>'
        threshold:
          type: number
          description: 阈值
          example: 85
        severity:
          type: string
          description: 告警严重级别
          enum: [low, medium, high, critical]
          default: medium
          example: high
        actions:
          type: string
          description: 触发后的动作（JSON字符串）
          example: '{"notify": true, "create_work_order": true}'
        enabled:
          type: boolean
          description: 是否启用
          default: true
          example: true
        cooldown_sec:
          type: integer
          description: 冷却时间（秒），防止重复告警
          default: 300
          example: 300

    AgentQuery:
      type: object
      description: AI智能体查询请求
      required: [query]
      properties:
        query:
          type: string
          description: 自然语言查询内容
          example: "1号CNC设备的温度是否正常？"
        context:
          type: object
          description: 额外的上下文信息
          additionalProperties: true
          example:
            alert_history: true
            time_range: 7d
        device_id:
          type: string
          description: 关联设备ID（可选）
          example: DEV001
        session_id:
          type: string
          description: 会话ID，用于多轮对话
          example: sess_abc123

    AgentResponse:
      type: object
      description: AI智能体响应
      properties:
        session_id:
          type: string
          description: 会话ID，用于后续多轮对话
          example: sess_abc123
        response:
          type: string
          description: AI智能体的自然语言响应
          example: "1号CNC设备当前温度为72.5℃，处于正常范围内（上限85℃）。设备运行稳定。"
        agent:
          type: string
          description: 处理该请求的智能体类型
          enum: [DeviceAgent, PredictAgent, AlertAgent, CoordinatorAgent]
          example: DeviceAgent
        actions:
          type: array
          description: 建议执行的后续操作列表
          items:
            type: object
            properties:
              type:
                type: string
                description: 操作类型
              device_id:
                type: string
                description: 相关设备ID
              priority:
                type: string
                description: 优先级
              description:
                type: string
                description: 操作描述
          example:
            - type: create_work_order
              device_id: DEV002
              priority: high
              description: 检查冷却系统
        timestamp:
          type: string
          format: date-time
          description: 响应时间
          example: "2024-01-15T10:35:00Z"

    WorkOrder:
      type: object
      description: 维护工单
      required: [title, device_id]
      properties:
        id:
          type: integer
          description: 工单ID（创建时自动生成）
          example: 100
        title:
          type: string
          description: 工单标题
          example: CNC设备冷却系统检查
        description:
          type: string
          description: 工单详细描述
          example: 设备DEV002频繁出现高温告警，需要检查冷却系统工作状态
        device_id:
          type: string
          description: 关联设备ID
          example: DEV002
        priority:
          type: string
          description: 工单优先级
          enum: [low, medium, high, urgent]
          default: medium
          example: high
        status:
          type: string
          description: 工单状态
          enum: [pending, in_progress, completed, cancelled]
          default: pending
          example: pending
        assigned_to:
          type: integer
          description: 分配给的用户ID
          example: 5
        created_at:
          type: string
          format: date-time
          description: 工单创建时间
          example: "2024-01-15T10:30:00Z"

    Report:
      type: object
      description: AI生成的报告
      properties:
        id:
          type: integer
          description: 报告ID
          example: 50
        title:
          type: string
          description: 报告标题
          example: 设备DEV001日运行报告
        type:
          type: string
          description: 报告类型
          enum: [daily, device, maintenance, anomaly, comprehensive]
          example: daily
        device_id:
          type: string
          description: 关联设备ID（部分报告类型需要）
          example: DEV001
        content:
          type: string
          description: 报告内容（Markdown格式）
          example: |
            # 设备运行报告
            
            ## 概览
            设备DEV001在过去24小时内运行稳定...
        generated_at:
          type: string
          format: date-time
          description: 报告生成时间
          example: "2024-01-15T08:00:00Z"

    ROIStats:
      type: object
      description: 投资回报率统计数据
      properties:
        total_devices:
          type: integer
          description: 设备总数
          example: 156
        active_alerts:
          type: integer
          description: 当前活跃告警数
          example: 12
        open_work_orders:
          type: integer
          description: 待处理工单数
          example: 8
        resolved_issues:
          type: integer
          description: 已解决问题数
          example: 45
        predicted_savings:
          type: number
          description: 预测节省成本（元）
          example: 128500.00
        uptime_percentage:
          type: number
          description: 设备可用率（%）
          example: 98.5
        avg_response_time_hours:
          type: number
          description: 平均告警响应时间（小时）
          example: 2.3

    SystemStatus:
      type: object
      description: 系统状态信息
      properties:
        database:
          type: string
          description: 数据库连接状态
          enum: [connected, disconnected, error]
          example: connected
        db_latency_ms:
          type: integer
          description: 数据库延迟（毫秒）
          example: 5
        uptime:
          type: string
          description: 系统运行时长
          example: "15d 6h 32m"
        version:
          type: string
          description: 系统版本号
          example: "1.0.0"
        timestamp:
          type: string
          format: date-time
          description: 当前时间戳
          example: "2024-01-15T10:30:00Z"
        device_count:
          type: integer
          description: 已注册设备总数
          example: 156
        user_count:
          type: integer
          description: 用户总数
          example: 25

    Alert:
      type: object
      description: 告警信息
      properties:
        id:
          type: integer
          description: 告警ID
          example: 1
        device_id:
          type: string
          description: 设备ID
          example: DEV001
        type:
          type: string
          description: 告警类型
          example: temperature_high
        severity:
          type: string
          description: 严重程度
          enum: [low, medium, high, critical]
          example: high
        message:
          type: string
          description: 告警消息
          example: "温度超过阈值85℃"
        status:
          type: string
          description: 告警状态
          enum: [active, acknowledged, resolved]
          example: active
        triggered_at:
          type: string
          format: date-time
          description: 触发时间
          example: "2024-01-15T10:30:00Z"
        resolved_at:
          type: string
          format: date-time
          description: 解决时间
        acknowledged_by:
