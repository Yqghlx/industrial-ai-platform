# golangci-lint configuration for v2.12.2
# Simplified configuration - all errcheck issues are in test files

version: "2"

run:
  timeout: 10m
  issues-exit-code: 0  # Don't fail CI for warnings
  tests: true

formatters:
  enable:
    - gofmt

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - bodyclose
  settings:
    errcheck:
      # Exclude common test operations
      exclude-functions:
        - os.Setenv
        - os.Unsetenv
        - (*os.File).Close
        - io.ReadCloser.Close
        - (*sql.DB).Close
        - (*sql.DB).Exec
        - json.Unmarshal
    staticcheck:
      # Focus on critical issues only
      checks:
        - all
        - -SA5011  # nil pointer false positive
        - -SA1012  # nil context in tests
        - -SA4010  # append unused
        - -SA9003  # empty branch
        - -SA1019  # deprecated
        - -SA1029  # context key type
        - -S1009   # nil check
        - -ST1000  # comment format
        - -ST1003  # naming
        - -ST1020  # exported comment
        - -ST1021  # exported type comment
        - -ST1022  # exported const comment
        - -QF1003  # tagged switch
        - -QF1008  # embedded selector
        - -S1024   # time.Until

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false