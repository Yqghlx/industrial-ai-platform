# Docker Compose for Development
# Industrial AI Agent Platform

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: industrial-ai-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_USER=industrial_user
      - POSTGRES_PASSWORD=industrial_password
      - POSTGRES_DB=industrial_ai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U industrial_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: industrial-ai-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-dev-data:/data

  # Adminer - Database GUI (Optional)
  adminer:
    image: adminer:latest
    container_name: industrial-ai-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=postgres
    depends_on:
      - postgres
    profiles:
      - tools

networks:
  default:
    name: industrial-ai-dev

volumes:
  postgres-dev-data:
    driver: local
  redis-dev-data:
    driver: local