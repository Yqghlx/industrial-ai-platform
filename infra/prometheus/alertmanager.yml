global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alerts@industrial-ai.example.com'
  smtp_auth_username: 'alerts@industrial-ai.example.com'
  smtp_auth_password: 'your-smtp-password'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['severity', 'category']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts - email only
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 5m
      repeat_interval: 12h

    # HTTP/WebSocket alerts
    - match:
        category: http
      receiver: 'ops-team'

    # Database alerts
    - match:
        category: database
      receiver: 'dba-team'

    # AI alerts
    - match:
        category: ai
      receiver: 'ai-team'

receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: 'http://backend:8080/api/v1/alerts/webhook'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'ops-team@industrial-ai.example.com'
        send_resolved: true
        headers:
          Subject: '[CRITICAL] Industrial AI Alert - {{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#alerts-critical'
        send_resolved: true
        title: '🚨 Critical Alert: {{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        color: '{{ if .Status == "firing" }}danger{{ else }}good{{ end }}'
    pagerduty_configs:
      - service_key: 'your-pagerduty-key'
        severity: critical
        description: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'ops-team@industrial-ai.example.com'
        send_resolved: true
        headers:
          Subject: '[WARNING] Industrial AI Alert - {{ .GroupLabels.alertname }}'

  - name: 'ops-team'
    email_configs:
      - to: 'ops@industrial-ai.example.com'
        send_resolved: true
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#ops-alerts'

  - name: 'dba-team'
    email_configs:
      - to: 'dba@industrial-ai.example.com'
        send_resolved: true

  - name: 'ai-team'
    email_configs:
      - to: 'ai-team@industrial-ai.example.com'
        send_resolved: true

inhibit_rules:
  # If service is down, inhibit other alerts from that service
  - source_match:
      alertname: 'ServiceDown'
      severity: 'critical'
    target_match_re:
      severity: 'warning'
    equal: ['job']

  # If critical alerts exist, inhibit warnings for same category
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['category']