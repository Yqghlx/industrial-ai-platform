# Kubernetes Deployment - Backend
# Industrial AI Agent Platform

apiVersion: v1
kind: Namespace
metadata:
  name: industrial-ai

---
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-secrets
  namespace: industrial-ai
type: Opaque
stringData:
  DATABASE_URL: "postgres://industrial_user:CHANGE_ME@postgres:5432/industrial_ai?sslmode=disable"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "CHANGE_ME"
  ADMIN_PASSWORD: "CHANGE_ME"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: industrial-ai-config
  namespace: industrial-ai
data:
  PORT: "8080"
  GIN_MODE: "release"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: industrial-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/yangqinggang-it/industrial-ai-platform/backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: industrial-ai-secrets
            - configMapRef:
                name: industrial-ai-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: industrial-ai
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: industrial-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/yangqinggang-it/industrial-ai-platform/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: industrial-ai
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: industrial-ai-ingress
  namespace: industrial-ai
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: industrial-ai.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80