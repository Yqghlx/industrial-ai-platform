# ============================================================================
# Industrial AI Platform - Kubernetes Secrets Configuration
# ============================================================================
# 
# 🚨 SECURITY WARNING: This file contains placeholders only!
#    DO NOT commit actual secrets to Git!
# 
# 📋 Quick Start - Generate secrets using one of these methods:
# 
#    Method 1: Use the provided generation script
#    --------------------------------------------
#    ./scripts/generate-secrets.sh
# 
#    Method 2: Generate manually with kubectl
#    -----------------------------------------
#    kubectl create secret generic industrial-ai-secrets \
#      --namespace=industrial-ai \
#      --from-literal=jwt-secret="$(openssl rand -base64 32)" \
#      --from-literal=database-url="postgres://user:pass@host:5432/db?sslmode=require" \
#      --from-literal=redis-password="$(openssl rand -base64 24)" \
#      --from-literal=glm-api-key="your-api-key" \
#      --from-literal=encryption-key="$(openssl rand -base64 32)" \
#      --dry-run=client -o yaml | kubectl apply -f -
# 
#    Method 3: Generate base64 values for this file
#    -----------------------------------------------
#    # JWT Secret (256-bit, 32 bytes)
#    echo -n "$(openssl rand -base64 32)" | base64
#    
#    # Encryption Key (AES-256, 32 bytes)
#    echo -n "$(openssl rand -base64 32)" | base64
#    
#    # Redis Password (24 bytes)
#    echo -n "$(openssl rand -base64 24)" | base64
#    
#    # Database URL
#    echo -n "postgres://user:password@host:5432/dbname?sslmode=require" | base64
#    
#    # API Key
#    echo -n "your-api-key-here" | base64
# 
# ============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-secrets
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: secrets
  annotations:
    # Secret rotation schedule
    secrets.k8s.io/rotation: "90d"
    # Last rotation timestamp (update manually after rotation)
    secrets.k8s.io/last-rotated: "2026-01-01"
type: Opaque
data:
  # ========================================================================
  # JWT Secret (256-bit random)
  # ========================================================================
  # Generate: openssl rand -base64 32 | base64
  # Example output: K7x2mN9pQrStUvWxYzAbCdEfGhIjKlMnOpQrStUvWxY=
  # Rotate: Every 90 days via CronJob or manually
  jwt-secret: PLACEHOLDER_GENERATE_WITH_OPENSSL
  
  # ========================================================================
  # Database URL (Full PostgreSQL connection string)
  # ========================================================================
  # Format: postgres://username:password@hostname:5432/database?sslmode=require
  # SSL modes: disable, allow, prefer, require, verify-ca, verify-full
  # Production: Use sslmode=verify-full with CA certificate
  # Generate: echo -n "postgres://user:pass@host:5432/db?sslmode=require" | base64
  database-url: PLACEHOLDER_GENERATE_WITH_DB_CREDENTIALS
  
  # ========================================================================
  # Redis Password (24 bytes random)
  # ========================================================================
  # Generate: openssl rand -base64 24 | base64
  # Note: Configure Redis AUTH with this password
  redis-password: PLACEHOLDER_GENERATE_WITH_OPENSSL
  
  # ========================================================================
  # GLM API Key (Your API key from provider)
  # ========================================================================
  # Get from: https://open.bigmodel.cn/api-keys
  # Generate: echo -n "your-api-key-here" | base64
  glm-api-key: PLACEHOLDER_GET_FROM_API_PROVIDER
  
  # ========================================================================
  # Encryption Key (AES-256, 32 bytes)
  # ========================================================================
  # Generate: openssl rand -base64 32 | base64
  # Used for: Encrypting sensitive data at rest
  # WARNING: Rotating this key requires re-encrypting all existing data!
  encryption-key: PLACEHOLDER_GENERATE_WITH_OPENSSL
---
# ============================================================================
# Database Credentials Secret
# ============================================================================
# Used by: PostgreSQL init scripts, backup jobs, administrative tasks
# 
# Generate passwords:
#   # App password (for application connection)
#   APP_PASS=$(openssl rand -base64 24)
#   echo -n "$APP_PASS" | base64
#   
#   # Backup password (for pg_dump/pg_restore)
#   BACKUP_PASS=$(openssl rand -base64 24)
#   echo -n "$BACKUP_PASS" | base64
#   
#   # Admin password (for postgres superuser - CHANGE DEFAULT!)
#   ADMIN_PASS=$(openssl rand -base64 32)
#   echo -n "$ADMIN_PASS" | base64
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-db-credentials
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: database
  annotations:
    # PostgreSQL user passwords
    postgres.k8s.io/app-user: "industrial_user"
    postgres.k8s.io/backup-user: "backup_user"
type: Opaque
data:
  # ========================================================================
  # PostgreSQL Application User Password
  # ========================================================================
  # User: industrial_user
  # Permissions: SELECT, INSERT, UPDATE, DELETE on application tables
  # Generate: echo -n "$(openssl rand -base64 24)" | base64
  postgres-app-password: PLACEHOLDER_GENERATE_WITH_OPENSSL
  
  # ========================================================================
  # PostgreSQL Backup User Password
  # ========================================================================
  # User: backup_user
  # Permissions: SELECT on all tables, USAGE on schemas
  # Used by: pg_dump, pg_basebackup
  # Generate: echo -n "$(openssl rand -base64 24)" | base64
  postgres-backup-password: PLACEHOLDER_GENERATE_WITH_OPENSSL
  
  # ========================================================================
  # PostgreSQL Administrator Password
  # ========================================================================
  # User: postgres (superuser)
  # ⚠️ SECURITY: Change this immediately after initial deployment!
  # ⚠️ Only use for initialization and emergency maintenance
  # Generate: echo -n "$(openssl rand -base64 32)" | base64
  postgres-admin-password: PLACEHOLDER_GENERATE_AND_CHANGE_DEFAULT
---
# ============================================================================
# TLS Certificate Secret
# ============================================================================
# Used by: Ingress controller, internal service mesh (mTLS)
# 
# TLS Certificate Options:
# 
#   Option 1: Let's Encrypt (Recommended for production)
#   -----------------------------------------------
#   Use cert-manager for automatic certificate management:
#   
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
#   
#   # Create ClusterIssuer for Let's Encrypt
#   kubectl apply -f - <<EOF
#   apiVersion: cert-manager.io/v1
#   kind: ClusterIssuer
#   metadata:
#     name: letsencrypt-prod
#   spec:
#     acme:
#       server: https://acme-v02.api.letsencrypt.org/directory
#       email: your-email@example.com
#       privateKeySecretRef:
#         name: letsencrypt-prod
#       solvers:
#       - http01:
#           ingress:
#             class: nginx
#   EOF
#   
#   Option 2: Self-signed certificate (Development only!)
#   ----------------------------------------------------
#   # Generate self-signed certificate (NOT for production!)
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout tls.key -out tls.crt \
#     -subj "/CN=industrial-ai.example.com" \
#     -addext "subjectAltName=DNS:industrial-ai.example.com,DNS:api.industrial-ai.example.com"
#   
#   # Create Kubernetes secret
#   kubectl create secret tls industrial-ai-tls-secret \
#     --namespace=industrial-ai \
#     --cert=tls.crt --key=tls.key \
#     --dry-run=client -o yaml | kubectl apply -f -
#   
#   Option 3: Enterprise certificate
#   ---------------------------------
#   # Convert your enterprise certificate to Kubernetes secret
#   kubectl create secret tls industrial-ai-tls-secret \
#     --namespace=industrial-ai \
#     --cert=path/to/fullchain.pem \
#     --key=path/to/privkey.pem
#   
#   Verify certificate:
#   -------------------
#   kubectl get secret industrial-ai-tls-secret -n industrial-ai -o jsonpath='{.data.tls\.crt}' | base64 -d | openssl x509 -noout -text
# 
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-tls-secret
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: tls
  annotations:
    # Certificate manager annotations (if using cert-manager)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/common-name: "industrial-ai.example.com"
type: kubernetes.io/tls
data:
  # ========================================================================
  # TLS Certificate Chain (fullchain)
  # ========================================================================
  # For Let's Encrypt: This is the full certificate chain including intermediate
  # For self-signed: Just the server certificate
  # For enterprise: Include all certificates in chain order
  # 
  # Encode: cat fullchain.pem | base64 -w0
  # Verify: echo "$ENCODED" | base64 -d | openssl x509 -noout -text
  tls.crt: PLACEHOLDER_ENCODE_WITH_BASE64
  
  # ========================================================================
  # TLS Private Key
  # ========================================================================
  # ⚠️ SECURITY: Keep this key secure and never commit to Git!
  # 
  # Encode: cat privkey.pem | base64 -w0
  # Verify: echo "$ENCODED" | base64 -d | openssl rsa -check -noout
  tls.key: PLACEHOLDER_ENCODE_WITH_BASE64
---
# ============================================================================
# RBAC Configuration - Least Privilege Access
# ============================================================================
# Security Principle: Only grant minimum required permissions
# 
# This Role allows the backend ServiceAccount to read (get) secrets only.
# It cannot list, watch, create, update, or delete secrets.
# ============================================================================
# Role: Secrets Reader
# Grants read-only access to specific secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-reader
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
    rbac.k8s.io/type: "read-only"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - industrial-ai-secrets
      - industrial-ai-db-credentials
      - industrial-ai-tls-secret
    verbs: ["get"]
    # Note: No "list", "watch", "create", "update", "delete" - only "get"
---
# RoleBinding: Binds the secrets-reader role to backend-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-secrets-reader
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: industrial-ai
roleRef:
  kind: Role
  name: secrets-reader
  apiGroup: rbac.authorization.k8s.io
---
# ============================================================================
# ServiceAccount for Backend
# ============================================================================
# Best Practice: Use dedicated ServiceAccount for each component
# This allows fine-grained RBAC control and audit logging
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: backend
  # Automount API token (set to false if not needed by application)
  automountServiceAccountToken: true
---
# ============================================================================
# SEC-003: Secret Rotation CronJob
# ============================================================================
# Automatically rotates secrets every 90 days to maintain security hygiene
# 
# Schedule: "0 2 1 */3" = At 02:00 on day 1 of every 3rd month
# 
# Operations:
#   - Generates new JWT secret
#   - Generates new encryption key
#   - Generates new Redis password
#   - Restarts affected pods to pick up new secrets
# 
# Prerequisites:
#   - secrets-rotation-sa ServiceAccount with appropriate RBAC permissions
#   - secrets-rotation-script ConfigMap containing the rotation script
# 
# Manual Rotation:
#   kubectl create job --from=cronjob/secrets-rotation manual-rotation -n industrial-ai
# 
# Monitoring:
#   kubectl logs -n industrial-ai -l component=secrets-rotation --tail=100
# ============================================================================
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secrets-rotation
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
    security.k8s.io/rotation: "enabled"
spec:
  schedule: "0 2 1 */3"  # Every 3 months at 2 AM on the 1st
  concurrencyPolicy: Forbid  # Prevent concurrent runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600  # Timeout after 10 minutes
      template:
        metadata:
          labels:
            app: industrial-ai
            component: secrets-rotation
        spec:
          serviceAccountName: secrets-rotation-sa
          restartPolicy: OnFailure
          containers:
            - name: rotation
              image: bitnami/kubectl:1.28-debian-12
              command:
                - /bin/bash
                - /scripts/secret-rotation.sh
              env:
                - name: NAMESPACE
                  value: "industrial-ai"
                - name: SECRET_NAME
                  value: "industrial-ai-secrets"
                - name: ROTATE_JWT
                  value: "true"
                - name: ROTATE_ENCRYPTION
                  value: "true"
                - name: ROTATE_REDIS
                  value: "true"
                - name: ROTATE_DATABASE
                  value: "false"  # Requires manual coordination with DB
                - name: RESTART_REDIS
                  value: "true"
              volumeMounts:
                - name: rotation-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 100m
                  memory: 128Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
          volumes:
            - name: rotation-script
              configMap:
                name: secrets-rotation-script
                defaultMode: 0755
---
# ============================================================================
# Secret Rotation Script ConfigMap
# ============================================================================
# Contains the shell script that performs actual secret rotation
# The script is mounted as a volume in the CronJob pod
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-rotation-script
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
data:
  secret-rotation.sh: |
    #!/bin/bash
    # SEC-003: Inline Secret Rotation Script
    # This script is executed by the secrets-rotation CronJob
    set -euo pipefail
    
    NAMESPACE="${NAMESPACE:-industrial-ai}"
    SECRET_NAME="${SECRET_NAME:-industrial-ai-secrets}"
    
    log() {
        echo "[rotation] $(date '+%Y-%m-%d %H:%M:%S') $1"
    }
    
    generate_secret() {
        openssl rand -base64 32
    }
    
    update_secret() {
        local key="$1"
        local value="$2"
        local encoded=$(echo -n "$value" | base64)
        kubectl patch secret "$SECRET_NAME" -n "$NAMESPACE" \
            --type=json \
            -p='[{"op": "replace", "path": "/data/'"$key"'", "value": "'"$encoded"'"}]' || \
        kubectl create secret generic "$SECRET_NAME" -n "$NAMESPACE" \
            --from-literal="$key=$value" --dry-run=client -o yaml | \
        kubectl apply -f -
    }
    
    restart_deployment() {
        local name="$1"
        kubectl rollout restart deployment "$name" -n "$NAMESPACE"
        kubectl rollout status deployment "$name" -n "$NAMESPACE" --timeout=300s
    }
    
    log "Starting secret rotation..."
    
    if [ "${ROTATE_JWT:-true}" = "true" ]; then
        log "Rotating JWT secret..."
        update_secret "jwt-secret" "$(generate_secret)"
    fi
    
    if [ "${ROTATE_ENCRYPTION:-true}" = "true" ]; then
        log "Rotating encryption key..."
        update_secret "encryption-key" "$(generate_secret)"
    fi
    
    if [ "${ROTATE_REDIS:-true}" = "true" ]; then
        log "Rotating Redis password..."
        update_secret "redis-password" "$(openssl rand -base64 24)"
    fi
    
    # Restart backend to pick up new secrets
    restart_deployment "backend"
    
    log "Secret rotation completed successfully!"
---
# ============================================================================
# ServiceAccount for Secret Rotation
# ============================================================================
# Dedicated ServiceAccount for the secrets-rotation CronJob
# Has permissions to patch secrets and restart deployments
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-rotation-sa
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
---
# ============================================================================
# Role for Secret Rotation
# ============================================================================
# Grants permissions to:
#   - Patch and update specific secrets
#   - Restart deployments (rollout)
#   - Watch rollout status
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-rotation-role
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
rules:
  # Permission to patch specific secrets
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - industrial-ai-secrets
      - industrial-ai-db-credentials
    verbs: ["get", "patch", "update"]
  # Permission to restart specific deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - backend
      - redis
    verbs: ["get", "patch", "update"]
  # Permission to list deployments (for rollout status)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "watch"]
---
# ============================================================================
# RoleBinding for Secret Rotation
# ============================================================================
# Binds the secrets-rotation-role to secrets-rotation-sa
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-rotation-binding
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
subjects:
  - kind: ServiceAccount
    name: secrets-rotation-sa
    namespace: industrial-ai
roleRef:
  kind: Role
  name: secrets-rotation-role
  apiGroup: rbac.authorization.k8s.io