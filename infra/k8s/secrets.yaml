apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-secrets
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: secrets
type: Opaque
data:
  # 所有值必须 base64 编码
  # 生成方式: echo -n "your-secret-value" | base64
  # 或使用 kubectl create secret generic --from-literal
  
  # JWT Secret (256 位随机)
  # 生成: openssl rand -base64 32 | base64
  jwt-secret: <base64-encoded-jwt-secret>
  
  # Database URL (完整连接字符串)
  # 格式: postgres://user:password@host:5432/db?sslmode=require
  database-url: <base64-encoded-database-url>
  
  # Redis Password
  redis-password: <base64-encoded-redis-password>
  
  # GLM API Key
  glm-api-key: <base64-encoded-glm-api-key>
  
  # Encryption Key (AES-256)
  encryption-key: <base64-encoded-encryption-key>
---
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-db-credentials
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: database
type: Opaque
data:
  # PostgreSQL 应用用户密码
  postgres-app-password: <base64-encoded-password>
  
  # PostgreSQL 备份用户密码
  postgres-backup-password: <base64-encoded-password>
  
  # PostgreSQL 管理员密码 (仅初始化使用)
  postgres-admin-password: <base64-encoded-password>
---
apiVersion: v1
kind: Secret
metadata:
  name: industrial-ai-tls-secret
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: tls
type: kubernetes.io/tls
data:
  # TLS 证书 (Let's Encrypt 或企业证书)
  tls.crt: <base64-encoded-certificate-chain>
  tls.key: <base64-encoded-private-key>
---
# 仅允许 backend ServiceAccount 读取 Secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-reader
  namespace: industrial-ai
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - industrial-ai-secrets
      - industrial-ai-db-credentials
      - industrial-ai-tls-secret
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-secrets-reader
  namespace: industrial-ai
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: industrial-ai
roleRef:
  kind: Role
  name: secrets-reader
  apiGroup: rbac.authorization.k8s.io
---
# ServiceAccount for backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: industrial-ai
---
# SEC-003: 密钥自动轮换 CronJob (实际执行轮换)
# 此 CronJob 会定期生成新密钥并更新 Kubernetes Secrets
apiVersion: batch/v1
kind: CronJob
metadata:
  name: secrets-rotation
  namespace: industrial-ai
  labels:
    app: industrial-ai
    component: security
spec:
  schedule: "0 2 1 */3"  # 每3个月1日凌晨2点执行
  concurrencyPolicy: Forbid  # 不允许并发执行
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2  # 失败重试次数
      template:
        metadata:
          labels:
            app: industrial-ai
            component: secrets-rotation
        spec:
          serviceAccountName: secrets-rotation-sa
          containers:
            - name: rotation
              image: bitnami/kubectl:latest
              command:
                - /bin/bash
                - /scripts/secret-rotation.sh
              env:
                - name: NAMESPACE
                  value: "industrial-ai"
                - name: SECRET_NAME
                  value: "industrial-ai-secrets"
                - name: ROTATE_JWT
                  value: "true"
                - name: ROTATE_ENCRYPTION
                  value: "true"
                - name: ROTATE_REDIS
                  value: "true"
                - name: ROTATE_DATABASE
                  value: "false"  # 需要手动协调
                - name: RESTART_REDIS
                  value: "true"
              volumeMounts:
                - name: rotation-script
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: rotation-script
              configMap:
                name: secrets-rotation-script
                defaultMode: 0755
          restartPolicy: OnFailure
---
# ConfigMap containing the rotation script
apiVersion: v1
kind: ConfigMap
metadata:
  name: secrets-rotation-script
  namespace: industrial-ai
data:
  secret-rotation.sh: |
    #!/bin/bash
    # SEC-003: Inline Secret Rotation Script
    set -euo pipefail
    
    NAMESPACE="${NAMESPACE:-industrial-ai}"
    SECRET_NAME="${SECRET_NAME:-industrial-ai-secrets}"
    
    log() {
        echo "[rotation] $(date '+%Y-%m-%d %H:%M:%S') $1"
    }
    
    generate_secret() {
        openssl rand -base64 32
    }
    
    update_secret() {
        local key="$1"
        local value="$2"
        local encoded=$(echo -n "$value" | base64)
        kubectl patch secret "$SECRET_NAME" -n "$NAMESPACE" \
            --type=json \
            -p='[{"op": "replace", "path": "/data/'"$key"'", "value": "'"$encoded"'"}]' || \
        kubectl create secret generic "$SECRET_NAME" -n "$NAMESPACE" \
            --from-literal="$key=$value" --dry-run=client -o yaml | \
        kubectl apply -f -
    }
    
    restart_deployment() {
        local name="$1"
        kubectl rollout restart deployment "$name" -n "$NAMESPACE"
        kubectl rollout status deployment "$name" -n "$NAMESPACE" --timeout=300s
    }
    
    log "Starting secret rotation..."
    
    if [ "${ROTATE_JWT:-true}" = "true" ]; then
        log "Rotating JWT secret..."
        update_secret "jwt-secret" "$(generate_secret)"
    fi
    
    if [ "${ROTATE_ENCRYPTION:-true}" = "true" ]; then
        log "Rotating encryption key..."
        update_secret "encryption-key" "$(generate_secret)"
    fi
    
    if [ "${ROTATE_REDIS:-true}" = "true" ]; then
        log "Rotating Redis password..."
        update_secret "redis-password" "$(openssl rand -base64 24)"
    fi
    
    # Restart backend to pick up new secrets
    restart_deployment "backend"
    
    log "Secret rotation completed successfully!"
---
# ServiceAccount for secrets rotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-rotation-sa
  namespace: industrial-ai
---
# Role for secrets rotation (can patch secrets and restart deployments)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secrets-rotation-role
  namespace: industrial-ai
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - industrial-ai-secrets
      - industrial-ai-db-credentials
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - backend
      - redis
    verbs: ["get", "patch", "update", "rollout"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["list", "watch"]  # For rollout status
---
# RoleBinding for secrets rotation
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secrets-rotation-binding
  namespace: industrial-ai
subjects:
  - kind: ServiceAccount
    name: secrets-rotation-sa
    namespace: industrial-ai
roleRef:
  kind: Role
  name: secrets-rotation-role
  apiGroup: rbac.authorization.k8s.io