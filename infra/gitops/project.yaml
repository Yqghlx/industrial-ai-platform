# ArgoCD Project Configuration
# Industrial AI Platform Project Definition

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: industrial-ai
  namespace: argocd
  labels:
    app.kubernetes.io/name: industrial-ai-project
    app.kubernetes.io/component: project
  annotations:
    description: "Industrial AI Platform GitOps Project"
spec:
  # Project description
  description: Industrial AI Platform Production Deployment Project
  
  # Source repositories
  sourceRepos:
    - https://gitee.com/yangqinggang-it/industrial-ai-platform.git
    - https://gitee.com/yangqinggang-it/*.git  # Allow all repos under org
    - https://github.com/argoproj/*.git  # ArgoCD Helm charts
  
  # Destination clusters and namespaces
  destinations:
    # Production cluster
    - server: https://kubernetes.default.svc
      namespace: industrial-ai
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: logging
    
    # Development/Staging clusters (if needed)
    - server: https://dev-cluster.example.com
      namespace: industrial-ai-dev
    - server: https://staging-cluster.example.com
      namespace: industrial-ai-staging
  
  # Cluster resource whitelist
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: ''
      kind: PersistentVolume
    - group: ''
      kind: PersistentVolumeClaim
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
  
  # Namespace resource whitelist
  namespaceResourceWhitelist:
    - group: ''
      kind: '*'
    - group: apps
      kind: '*'
    - group: batch
      kind: '*'
    - group: extensions
      kind: '*'
    - group: networking.k8s.io
      kind: '*'
    - group: monitoring.coreos.com
      kind: '*'
    - group: integreatly.org
      kind: '*'
  
  # Namespace resource blacklist (prevent dangerous resources)
  namespaceResourceBlacklist:
    - group: ''
      kind: ResourceQuota
    - group: ''
      kind: LimitRange
  
  # Roles and permissions
  roles:
    # Admin role
    - name: admin
      description: Full admin access to the project
      policies:
        - p, proj:industrial-ai:admin, applications, *, industrial-ai/*, allow
        - p, proj:industrial-ai:admin, repositories, *, industrial-ai/*, allow
        - p, proj:industrial-ai:admin, clusters, *, industrial-ai/*, allow
        - p, proj:industrial-ai:admin, logs, get, industrial-ai/*, allow
        - p, proj:industrial-ai:admin, exec, create, industrial-ai/*, allow
      groups:
        - industrial-ai:devops-admins
    
    # Developer role
    - name: developer
      description: Developer access - sync and rollback
      policies:
        - p, proj:industrial-ai:developer, applications, get, industrial-ai/*, allow
        - p, proj:industrial-ai:developer, applications, sync, industrial-ai/*, allow
        - p, proj:industrial-ai:developer, applications, rollback, industrial-ai/*, allow
        - p, proj:industrial-ai:developer, applications, refresh, industrial-ai/*, allow
        - p, proj:industrial-ai:developer, logs, get, industrial-ai/*, allow
      groups:
        - industrial-ai:developers
    
    # Viewer role
    - name: viewer
      description: Read-only access
      policies:
        - p, proj:industrial-ai:viewer, applications, get, industrial-ai/*, allow
        - p, proj:industrial-ai:viewer, logs, get, industrial-ai/*, allow
      groups:
        - industrial-ai:viewers
        - industrial-ai:qa-team
  
  # Sync windows (restrict sync times)
  syncWindows:
    # Allow sync during business hours
    - kind: allow
      schedule: '10 0-16 * * 1-5'  # Mon-Fri, 0-16 UTC (8am-12am Beijing)
      duration: 8h
      applications:
        - '*'
      namespaces:
        - '*'
    
    # Block sync during maintenance windows
    - kind: deny
      schedule: '0 2-4 * * 0,6'  # Sun-Sat, 2-4 UTC (maintenance window)
      duration: 2h
      applications:
        - '*'
      namespaces:
        - '*'
      manualSync: false  # Disable manual sync during this window
  
  # Orphaned resources monitoring
  orphanedResources:
    warn: true
    ignore:
      - group: ''
        kind: Secret
        name: argocd-repo-credentials
  
  # Resource tracking method
  status:
    resourceTrackingMethod: annotation
  
  # Permit only project-level secrets
  permitOnlyProjectScopedClusters: false

---
# Preview Environment Project (for PR previews)
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: industrial-ai-preview
  namespace: argocd
spec:
  description: Industrial AI Platform Preview Environments (PR-based)
  sourceRepos:
    - https://gitee.com/yangqinggang-it/industrial-ai-platform.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: industrial-ai-preview-*
  namespaceResourceWhitelist:
    - group: ''
      kind: '*'
    - group: apps
      kind: '*'
  roles:
    - name: preview-admin
      description: Preview environment admin
      policies:
        - p, proj:industrial-ai-preview:preview-admin, applications, *, industrial-ai-preview/*, allow
      groups:
        - industrial-ai:developers