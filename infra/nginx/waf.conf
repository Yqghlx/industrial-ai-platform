# Nginx WAF 配置文件
# Industrial AI Platform - Web 应用防火墙规则

# ============================================
# 全局安全配置
# ============================================

# 禁止敏感 HTTP 方法
map $request_method $allowed_method {
    default 0;
    GET 1;
    POST 1;
    PUT 1;
    DELETE 1;
    HEAD 1;
    OPTIONS 1;
}

# 禁止危险 User-Agent
map $http_user_agent $blocked_agent {
    default 0;
    ~*bot 1;
    ~*crawler 1;
    ~*spider 1;
    ~*scan 1;
    ~*nikto 1;
    ~*sqlmap 1;
    ~*masscan 1;
    "" 1;
}

# SQL 注入检测
map $args $sql_injection {
    default 0;
    ~*select 1;
    ~*insert 1;
    ~*update 1;
    ~*delete 1;
    ~*drop 1;
    ~*union 1;
    ~*exec 1;
    ~*script 1;
    ~*declare 1;
    ~*truncate 1;
}

# XSS 检测
map $args $xss_attack {
    default 0;
    ~*<script 1;
    ~*javascript: 1;
    ~*onerror 1;
    ~*onclick 1;
    ~*onload 1;
    ~*onmouseover 1;
    ~*onfocus 1;
    ~*onblur 1;
    ~*alert\( 1;
    ~*eval\( 1;
}

# 路径遍历检测
map $args $path_traversal {
    default 0;
    ~*../ 1;
    ~*..\\ 1;
    ~*%2e%2e%2f 1;
    ~*%252e%252e%252f 1;
    ~*/etc/passwd 1;
    ~*/etc/shadow 1;
    ~*c:\\windows 1;
}

# 命令注入检测
map $args $command_injection {
    default 0;
    ~*; 1;
    ~*| 1;
    ~*` 1;
    ~*$\( 1;
    ~*exec\( 1;
    ~*system\( 1;
    ~*passthru\( 1;
    ~*shell_exec\( 1;
}

# SSRF 检测
map $args $ssrf_attack {
    default 0;
    ~*http://localhost 1;
    ~*http://127.0.0.1 1;
    ~*http://0.0.0.0 1;
    ~*file:// 1;
    ~*ftp:// 1;
    ~*dict:// 1;
    ~*gopher:// 1;
}

# 文件上传危险类型检测
map $request_body $dangerous_upload {
    default 0;
    ~*.php 1;
    ~*.jsp 1;
    ~*.asp 1;
    ~*.aspx 1;
    ~*.exe 1;
    ~*.sh 1;
    ~*.bat 1;
    ~*.cmd 1;
}

# ============================================
# 限流配置
# ============================================

# 请求速率限制 (基于 IP)
limit_req_zone $binary_remote_addr zone=req_limit_per_ip:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=req_limit_api:10m rate=50r/s;
limit_req_zone $server_name zone=req_limit_server:10m rate=100r/s;

# 连接数限制 (基于 IP)
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;
limit_conn_zone $server_name zone=conn_limit_server:10m;

# ============================================
# Server 配置
# ============================================

server {
    listen 80;
    listen 443 ssl;
    server_name api.industrial-ai.com;
    
    # SSL 配置
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    
    # ============================================
    # WAF 规则应用
    # ============================================
    
    # 禁止危险请求方法
    if ($allowed_method = 0) {
        return 405 "Method Not Allowed";
    }
    
    # 禁止危险 User-Agent
    if ($blocked_agent = 1) {
        return 403 "Forbidden User-Agent";
    }
    
    # 禁止 SQL 注入
    if ($sql_injection = 1) {
        return 403 "SQL Injection Blocked";
    }
    
    # 禁止 XSS 攻击
    if ($xss_attack = 1) {
        return 403 "XSS Attack Blocked";
    }
    
    # 禁止路径遍历
    if ($path_traversal = 1) {
        return 403 "Path Traversal Blocked";
    }
    
    # 禁止命令注入
    if ($command_injection = 1) {
        return 403 "Command Injection Blocked";
    }
    
    # 禁止 SSRF 攻击
    if ($ssrf_attack = 1) {
        return 403 "SSRF Attack Blocked";
    }
    
    # 禁止危险文件上传
    if ($dangerous_upload = 1) {
        return 403 "Dangerous File Upload Blocked";
    }
    
    # ============================================
    # 限流规则应用
    # ============================================
    
    # API 请求限流
    limit_req zone=req_limit_api burst=100 nodelay;
    limit_req_status 429;
    
    # 单 IP 连接限流
    limit_conn conn_limit_per_ip 20;
    limit_conn_status 429;
    
    # ============================================
    # 安全头配置
    # ============================================
    
    # 防止点击劫持
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # 防止 MIME 类型嗅探
    add_header X-Content-Type-Options "nosniff" always;
    
    # XSS 防护
    add_header X-XSS-Protection "1; mode=block" always;
    
    # 内容安全策略
    add_header Content-Security-Policy "default-src 'self'" always;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 防止信息泄露
    add_header X-Powered-By "";
    add_header Server "";
    
    # ============================================
    # 日志配置
    # ============================================
    
    # WAF 日志格式
    log_format waf_format '$remote_addr - $remote_user [$time_local] '
                          '"$request" $status $body_bytes_sent '
                          '"$http_referer" "$http_user_agent" '
                          'waf_rule="$waf_rule" '
                          'blocked_reason="$blocked_reason"';
    
    access_log /var/log/nginx/waf_access.log waf_format;
    error_log /var/log/nginx/waf_error.log;
    
    # ============================================
    # 反向代理配置
    # ============================================
    
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 转发 WAF 检查结果
        proxy_set_header X-WAF-Status $waf_status;
        
        # 请求体大小限制
        client_max_body_size 10m;
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    location /health {
        # 健康检查不受限流限制
        limit_req off;
        limit_conn off;
        
        proxy_pass http://backend:8080/health;
    }
    
    # 阻止敏感路径访问
    location ~* ^/(admin|config|backup|\.git|\.env) {
        deny all;
        return 403;
    }
}

# ============================================
# WAF 统计端点
# ============================================

server {
    listen 8081;
    server_name localhost;
    
    location /waf/stats {
        default_type application/json;
        return 200 '{"blocked_requests": 0, "sql_injection": 0, "xss": 0, "rate_limit": 0}';
    }
    
    location /waf/logs {
        alias /var/log/nginx/;
        autoindex on;
    }
}