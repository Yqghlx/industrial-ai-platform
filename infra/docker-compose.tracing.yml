version: "3.8"

# 分布式追踪栈 Docker Compose
# Industrial AI Platform - OpenTelemetry + Jaeger + Tempo

services:
  # ============================================
  # OpenTelemetry Collector
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.80.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Metrics
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: --config=/etc/otelcol-contrib/config.yaml
    networks:
      - tracing
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=industrial-ai"
      - "com.docker.compose.service=otel-collector"

  # ============================================
  # Jaeger - 分布式追踪 UI
  # ============================================
  jaeger:
    image: jaegertracing/all-in-one:1.47
    container_name: jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=info
    networks:
      - tracing
    depends_on:
      - otel-collector
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=industrial-ai"
      - "com.docker.compose.service=jaeger"

  # ============================================
  # Tempo - 分布式追踪后端 (Grafana 集成)
  # ============================================
  tempo:
    image: grafana/tempo:2.1.0
    container_name: tempo
    ports:
      - "3200:3200"   # HTTP API
      - "9095:9095"   # gRPC
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - tracing
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=industrial-ai"
      - "com.docker.compose.service=tempo"

  # ============================================
  # Grafana - 追踪可视化
  # ============================================
  grafana-tracing:
    image: grafana/grafana:10.0.0
    container_name: grafana-tracing
    ports:
      - "3002:3000"   # Grafana UI (避免冲突)
    volumes:
      - grafana-tracing-data:/var/lib/grafana
      - ./grafana/provisioning-tracing:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    networks:
      - tracing
    depends_on:
      - tempo
      - jaeger
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=industrial-ai"
      - "com.docker.compose.service=grafana-tracing"

volumes:
  tempo-data:
    driver: local
  grafana-tracing-data:
    driver: local

networks:
  tracing:
    driver: bridge
    name: industrial-ai-tracing