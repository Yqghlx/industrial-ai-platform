# Redis 生产环境配置文件
# Industrial AI Platform Redis 性能优化配置

# ============================================
# 网络配置
# ============================================
bind 0.0.0.0
port 6379
protected-mode yes
tcp-backlog 511
tcp-keepalive 300

# ============================================
# 通用配置
# ============================================
daemonize no
supervised no
pidfile /var/run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log
databases 16

# ============================================
# 内存管理 (关键优化)
# ============================================
# 最大内存限制 (根据服务器内存调整)
maxmemory 2gb

# 内存淘汰策略 (缓存场景推荐 LRU)
maxmemory-policy allkeys-lru

# LRU 样本数 (提高精度)
maxmemory-samples 10

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ============================================
# 持久化配置 (AOF + RDB 混合)
# ============================================
# RDB 快照
save 900 1      # 900 秒内至少 1 次修改
save 300 10     # 300 秒内至少 10 次修改
save 60 10000   # 60 秒内至少 10000 次修改

stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# AOF 持久化
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec          # 每秒同步 (性能 + 安全平衡)
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB-AOF 混合持久化 (Redis 4.0+)
aof-use-rdb-preamble yes

# ============================================
# 性能监控
# ============================================
# 慢查询日志
slowlog-max-len 128
slowlog-log-slower-than 10000  # 10 毫秒

# 延迟监控
latency-monitor-threshold 100  # 100 毫秒

# ============================================
# 客户端连接
# ============================================
maxclients 10000
timeout 0                      # 不超时

# ============================================
# 安全配置
# ============================================
# requirepass your-strong-password-here

# 重命名危险命令 (可选)
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""
# rename-command KEYS ""

# ============================================
# 主从复制 (如需要)
# ============================================
# replicaof <master-ip> <master-port>
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-disable-tcp-nodelay no
replica-priority 100

# ============================================
# Redis Cluster (如需要)
# ============================================
# cluster-enabled yes
# cluster-config-file nodes.conf
# cluster-node-timeout 5000
# cluster-replica-validity-factor 10
# cluster-migration-barrier 1
# cluster-require-full-coverage yes

# ============================================
# Lua 脚本
# ============================================
lua-time-limit 5000

# ============================================
# 事件通知
# ============================================
notify-keyspace-events ""

# ============================================
# 高级配置
# ============================================
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100
activerehashing yes

# ============================================
# CPU 配置
# ============================================
hz 10
dynamic-hz yes

# ============================================
# 内存管理高级
# ============================================
activedefrag no
jemalloc-bg-thread yes
ignore-warnings ARM64-CPU-BUG-WARNING