# Redis 哨兵配置文件
# Industrial AI Platform Redis 高可用配置

# ============================================
# 哨兵监控配置
# ============================================
# 监控主节点 (mymaster 是主节点名称)
# 参数: <master-name> <ip> <redis-port> <quorum>
# quorum: 同意故障转移的哨兵数量
sentinel monitor industrial-ai-redis redis-master 6379 2

# 主节点密码 (如有)
# sentinel auth-pass industrial-ai-redis your-password

# ============================================
# 故障检测配置
# ============================================
# 主节点多久无响应认为下线 (毫秒)
sentinel down-after-milliseconds industrial-ai-redis 30000

# 故障转移超时时间 (毫秒)
sentinel failover-timeout industrial-ai-redis 180000

# 同时可以有多少个从节点同步新主节点
sentinel parallel-syncs industrial-ai-redis 1

# ============================================
# 通知脚本 (可选)
# ============================================
# 故障转移时执行的脚本
# sentinel notification-script industrial-ai-redis /path/to/notification.sh

# 故障转移完成后执行的脚本
# sentinel client-reconfig-script industrial-ai-redis /path/to/reconfig.sh

# ============================================
# 哨兵通用配置
# ============================================
port 26379
bind 0.0.0.0
protected-mode yes

# 日志配置
logfile /var/log/redis/redis-sentinel.log
loglevel notice

# 工作目录
dir /var/lib/redis/sentinel

# ============================================
# 高级配置
# ============================================
# 哨兵之间通信超时
sentinel deny-scripts-reconfig yes

# 认证配置
# requirepass your-sentinel-password