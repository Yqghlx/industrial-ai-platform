# PostgreSQL 主节点配置文件
# Industrial AI Platform - PostgreSQL High Availability

# ============================================
# 基础配置
# ============================================
listen_addresses = '*'
port = 5432
max_connections = 200

# ============================================
# WAL 配置 (主节点复制)
# ============================================
wal_level = replica             # 启用 WAL 复制级别
max_wal_senders = 10            # 最大 WAL 发送进程数
wal_keep_size = 1GB             # 保留 WAL 文件大小 (防止复制延迟时删除)
max_replication_slots = 10      # 最大复制槽数量

# ============================================
# 复制配置
# ============================================
synchronous_commit = on         # 同步提交 (确保数据一致性)
wal_sender_delay = 200ms        # WAL 发送延迟

# ============================================
# 性能优化
# ============================================
shared_buffers = 1GB            # 共享缓冲区大小
work_mem = 64MB                 # 工作内存
maintenance_work_mem = 256MB    # 维护工作内存
checkpoint_completion_target = 0.9  # 检查点完成目标
wal_buffers = 64MB              # WAL 缓冲区

# ============================================
# 并发控制
# ============================================
effective_cache_size = 4GB      # 有效缓存大小
random_page_cost = 1.1          # 随机页成本 (SSD 优化)
effective_io_concurrency = 200  # 有效 IO 并发 (SSD 优化)

# ============================================
# 查询优化
# ============================================
default_statistics_target = 100 # 默认统计目标
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB

# ============================================
# 日志配置
# ============================================
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB

log_min_duration_statement = 1000  # 慢查询日志阈值 (ms)
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ============================================
# 监控配置
# ============================================
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# ============================================
# 安全配置
# ============================================
ssl = on                        # 启用 SSL
ssl_cert_file = '/etc/ssl/postgresql/server.crt'
ssl_key_file = '/etc/ssl/postgresql/server.key'
ssl_ca_file = '/etc/ssl/postgresql/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'

# ============================================
# 认证配置
# ============================================
password_encryption = scram-sha-256  # 密码加密方式

# ============================================
# 延迟监控
# ============================================
track_commit_timestamp = on     # 追踪提交时间戳

# ============================================
# 自动清理
# ============================================
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1

# ============================================
# 统计信息
# ============================================
stats_temp_directory = 'pg_stat_tmp'