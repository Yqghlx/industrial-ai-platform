# pgBouncer 配置文件
# Industrial AI Platform - PostgreSQL Connection Pool

# ============================================
# 数据库配置
# ============================================
[databases]
# 写连接 (指向主节点)
industrial_ai = host=postgres-primary port=5432 dbname=industrial_ai pool_size=50

# 读连接 (指向副本节点)
industrial_ai_read = host=postgres-replica port=5432 dbname=industrial_ai pool_size=30

# 管理连接 (指向主节点)
industrial_ai_admin = host=postgres-primary port=5432 dbname=industrial_ai pool_size=10

# ============================================
# pgBouncer 配置
# ============================================
[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# 连接池模式
pool_mode = transaction           # 事务级连接池

# 连接池大小
max_client_conn = 1000            # 最大客户端连接
default_pool_size = 50            # 默认连接池大小
min_pool_size = 10                # 最小连接池大小
reserve_pool_size = 10            # 备用连接池大小
reserve_pool_timeout = 5          # 备用连接池超时 (秒)

# 超时配置
server_connect_timeout = 15       # 服务器连接超时 (秒)
server_idle_timeout = 600         # 服务器空闲超时 (秒)
server_lifetime = 3600            # 服务器生命周期 (秒)
client_idle_timeout = 0           # 客户端空闲超时 (0 = 不超时)
client_login_timeout = 60         # 客户端登录超时 (秒)

# 连接重试
max_db_connections = 100          # 最大数据库连接
pkt_buf_size = 4096               # 包缓冲区大小
sbuf_loopcnt = 5                  # 发送缓冲区循环计数

# 查询超时
query_timeout = 30                # 查询超时 (秒)
query_wait_timeout = 120          # 查询等待超时 (秒)

# 用户配置
admin_users = postgres            # 管理用户
stats_users = postgres            # 统计用户

# 日志配置
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

# ============================================
# 忽略参数
# ============================================
ignore_startup_parameters = extra_float_digits,geqo

# ============================================
# 安全配置
# ============================================
# auth_user = postgres
# auth_query = SELECT password FROM pg_shadow WHERE usename = $1

