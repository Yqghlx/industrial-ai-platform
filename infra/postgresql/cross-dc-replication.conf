# PostgreSQL 跨数据中心复制配置
# 用于北京(主) - 上海(灾备) 双数据中心架构

# =============================================================================
# 主数据中心配置 (北京 DC-BJ)
# =============================================================================

# -----------------------------------------------------------------------------
# postgresql.conf - 主库配置
# -----------------------------------------------------------------------------

# 监听配置
listen_addresses = '*'
port = 5432
max_connections = 300

# WAL 配置 (用于流复制和逻辑复制)
wal_level = logical                    # 启用逻辑复制
max_wal_senders = 10                   # WAL 发送进程数
max_replication_slots = 10            # 复制槽数量
wal_keep_size = 2GB                    # WAL 保留大小

# 流复制配置 (同数据中心同步复制)
 synchronous_commit = on               # 同步提交
 synchronous_standby_names = 'dc-bj-standby1,dc-bj-standby2'  # 同步备库

# 逻辑复制配置
max_logical_replication_workers = 4   # 逻辑复制工作进程
max_sync_workers_per_subscription = 2 # 每个订阅的同步工作进程

# 内存配置
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 64MB
maintenance_work_mem = 512MB

# 检查点配置
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB

# 日志配置
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'ddl'
log_replication_commands = on

# TimescaleDB 扩展
shared_preload_libraries = 'timescaledb,pg_stat_statements'
timescaledb.max_background_workers = 8

# 统计配置
pg_stat_statements.track = all
track_activities = on
track_counts = on

# -----------------------------------------------------------------------------
# pg_hba.conf - 访问控制配置 (主数据中心)
# -----------------------------------------------------------------------------

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 本地管理访问
local   all             postgres                                peer
local   replication     replicator                              peer

# 本地网络访问
host    all             all             10.1.0.0/16             scram-sha-256
host    replication     replicator      10.1.0.0/16             scram-sha-256

# 灾备数据中心访问 (逻辑复制)
host    all             replicator      10.2.0.0/16             scram-sha-256
host    replication     replicator      10.2.0.0/16             scram-sha-256

# 应用访问
host    industrial_ai   app_user        10.1.0.0/16             scram-sha-256
host    industrial_ai   app_user        10.2.0.0/16             scram-sha-256

# -----------------------------------------------------------------------------
# 创建复制用户和发布 (主数据中心)
# -----------------------------------------------------------------------------

-- 创建复制用户
CREATE USER replicator WITH REPLICATION ENCRYPTED PASSWORD 'your-secure-password';

-- 创建逻辑复制发布
CREATE PUBLICATION cross_dc_publication FOR ALL TABLES;

-- 授权
GRANT SELECT ON ALL TABLES IN SCHEMA public TO replicator;
ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT ON TABLES TO replicator;

-- 查看发布状态
SELECT * FROM pg_publication;

# =============================================================================
# 灾备数据中心配置 (上海 DC-SH)
# =============================================================================

# -----------------------------------------------------------------------------
# postgresql.conf - 备库配置
# -----------------------------------------------------------------------------

# 监听配置
listen_addresses = '*'
port = 5432
max_connections = 300

# WAL 配置
wal_level = logical
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 2GB

# 作为备库时的热备份配置
hot_standby = on
hot_standby_feedback = on

# 逻辑复制配置
max_logical_replication_workers = 4
max_sync_workers_per_subscription = 2

# 内存配置
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 64MB
maintenance_work_mem = 512MB

# 检查点配置
checkpoint_completion_target = 0.9
checkpoint_timeout = 15min
max_wal_size = 4GB
min_wal_size = 1GB

# 日志配置
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'ddl'
log_replication_commands = on

# TimescaleDB 扩展
shared_preload_libraries = 'timescaledb,pg_stat_statements'
timescaledb.max_background_workers = 8

# -----------------------------------------------------------------------------
# pg_hba.conf - 访问控制配置 (灾备数据中心)
# -----------------------------------------------------------------------------

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 本地管理访问
local   all             postgres                                peer
local   replication     replicator                              peer

# 本地网络访问
host    all             all             10.2.0.0/16             scram-sha-256
host    replication     replicator      10.2.0.0/16             scram-sha-256

# 主数据中心访问
host    all             replicator      10.1.0.0/16             scram-sha-256
host    replication     replicator      10.1.0.0/16             scram-sha-256

# 应用访问
host    industrial_ai   app_user        10.2.0.0/16             scram-sha-256

# -----------------------------------------------------------------------------
# 创建订阅 (灾备数据中心)
# -----------------------------------------------------------------------------

-- 创建订阅 (连接到主数据中心)
CREATE SUBSCRIPTION cross_dc_subscription
    CONNECTION 'host=dc-bj-postgres-vip.test.com port=5432 user=replicator password=your-secure-password dbname=industrial_ai'
    PUBLICATION cross_dc_publication
    WITH (
        copy_data = true,           -- 初始数据复制
        create_slot = true,          -- 创建复制槽
        slot_name = 'cross_dc_slot', -- 指定槽名称
        synchronous_commit = off,     -- 异步提交
        binary = true                -- 二进制传输
    );

-- 查看订阅状态
SELECT * FROM pg_subscription;
SELECT * FROM pg_stat_subscription;

-- 监控复制延迟
SELECT 
    client_addr,
    state,
    sent_lsn,
    write_lsn,
    flush_lsn,
    replay_lsn,
    pg_wal_lsn_diff(sent_lsn, replay_lsn) AS replication_lag
FROM pg_stat_replication;

# =============================================================================
# Patroni 集群配置 (高可用)
# =============================================================================

# -----------------------------------------------------------------------------
# patroni.yml - 主数据中心配置
# -----------------------------------------------------------------------------

scope: industrial-ai-dc-bj
namespace: /db/
name: dc-bj-postgres1

restapi:
  listen: 10.1.1.11:8008
  connect_address: 10.1.1.11:8008

etcd:
  hosts: 10.1.1.101:2379,10.1.1.102:2379,10.1.1.103:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_mode_strict: true
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: logical
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 2GB
        synchronous_commit: on
        synchronous_standby_names: 'dc-bj-postgres2,dc-bj-postgres3'
        
  initdb:
    - encoding: UTF8
    - data-checksums

postgresql:
  listen: 0.0.0.0:5432
  connect_address: 10.1.1.11:5432
  data_dir: /var/lib/postgresql/15/main
  authentication:
    replication:
      username: replicator
      password: your-secure-password
    superuser:
      username: postgres
      password: your-secure-password

tags:
  nofailover: false
  noloadbalance: false
  clonefrom: false
  nosync: false

# -----------------------------------------------------------------------------
# patroni.yml - 灾备数据中心配置
# -----------------------------------------------------------------------------

scope: industrial-ai-dc-sh
namespace: /db/
name: dc-sh-postgres1

restapi:
  listen: 10.2.1.11:8008
  connect_address: 10.2.1.11:8008

etcd:
  hosts: 10.2.1.101:2379,10.2.1.102:2379,10.2.1.103:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: logical
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 2GB
        hot_standby: on

postgresql:
  listen: 0.0.0.0:5432
  connect_address: 10.2.1.11:5432
  data_dir: /var/lib/postgresql/15/main
  authentication:
    replication:
      username: replicator
      password: your-secure-password
    superuser:
      username: postgres
      password: your-secure-password

# =============================================================================
# TimescaleDB 特殊配置
# =============================================================================

-- 在主数据中心创建 hypertable 后，逻辑复制会自动处理
-- 确保订阅创建时 copy_data = true

-- 验证 TimescaleDB 复制
SELECT * FROM timescaledb_information.chunks;

-- 检查连续聚合复制状态
SELECT * FROM timescaledb_information.continuous_aggregates;

# =============================================================================
# 监控查询
# =============================================================================

-- 查看复制延迟
SELECT 
    client_addr,
    state,
    sent_lsn,
    write_lsn,
    flush_lsn,
    replay_lsn,
    pg_wal_lsn_diff(sent_lsn, replay_lsn) AS lag_bytes,
    pg_size_pretty(pg_wal_lsn_diff(sent_lsn, replay_lsn)) AS lag_size
FROM pg_stat_replication;

-- 查看逻辑复制状态
SELECT 
    subname,
    received_lsn,
    latest_end_lsn,
    latest_end_time,
    pg_wal_lsn_diff(received_lsn, latest_end_lsn) AS lag_bytes
FROM pg_stat_subscription;

-- 查看订阅表状态
SELECT 
    schemaname,
    relname,
    nspname,
    relname,
    state
FROM pg_stat_subscription_stats;

-- 检查复制冲突
SELECT * FROM pg_stat_database_conflicts;

# =============================================================================
# 故障切换脚本
# =============================================================================

-- 提升灾备数据中心为主库
-- 在灾备数据中心执行:

-- 1. 停止订阅
ALTER SUBSCRIPTION cross_dc_subscription DISABLE;

-- 2. 提升为可读写
-- Patroni 会自动处理，或手动执行:
-- pg_ctl promote

-- 3. 创建新的发布供其他数据中心订阅
CREATE PUBLICATION cross_dc_publication_new FOR ALL TABLES;

-- 4. 更新应用连接
-- 由 GSLB 和 VIP 处理

# =============================================================================
# 备份策略
# =============================================================================

# 每日全量备份 + WAL 归档
# 保留 7 天

# 主数据中心备份
pg_basebackup -h localhost -U replicator -D /backup/base -Ft -z -Xs -P

# WAL 归档配置
archive_mode = on
archive_command = 'rsync -av %p backup-server:/archive/%f'

# PITR 恢复示例
restore_command = 'rsync -av backup-server:/archive/%f %p'
recovery_target_time = '2024-01-15 12:00:00'

# =============================================================================
# 网络优化
# =============================================================================

# TCP 优化 (跨数据中心高延迟场景)
tcp_keepalives_idle = 60
tcp_keepalives_interval = 10
tcp_keepalives_count = 10

# 连接池配置 (PgBouncer)
[databases]
industrial_ai = host=dc-bj-postgres-vip port=5432 dbname=industrial_ai

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
reserve_pool_size = 5