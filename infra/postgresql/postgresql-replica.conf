# PostgreSQL 副本节点配置文件
# Industrial AI Platform - PostgreSQL High Availability

# ============================================
# 基础配置
# ============================================
listen_addresses = '*'
port = 5432
max_connections = 200

# ============================================
# 副本节点配置
# ============================================
hot_standby = on                # 启用热备份 (允许读查询)
hot_standby_feedback = on       # 反馈机制 (防止主节点删除 WAL)

# ============================================
# 主节点连接信息
# ============================================
primary_conninfo = 'host=postgres-primary port=5432 user=replicator password=<REPLICATION_PASSWORD> sslmode=require'

# ============================================
# 复制槽 (可选)
# ============================================
# primary_slot_name = 'replica_slot_1'

# ============================================
# WAL 接收进程
# ============================================
wal_receiver_status_interval = 10s  # WAL 接收状态报告间隔
wal_receiver_timeout = 60s          # WAL 接收超时

# ============================================
# 性能优化 (副本节点)
# ============================================
shared_buffers = 1GB
work_mem = 64MB
maintenance_work_mem = 256MB
checkpoint_completion_target = 0.9
wal_buffers = 64MB

# ============================================
# 并发控制
# ============================================
effective_cache_size = 4GB
random_page_cost = 1.1
effective_io_concurrency = 200

# ============================================
# 查询优化
# ============================================
default_statistics_target = 100
min_parallel_table_scan_size = 8MB
min_parallel_index_scan_size = 512kB

# ============================================
# 日志配置
# ============================================
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB

log_min_duration_statement = 1000
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# ============================================
# 监控配置
# ============================================
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all

# ============================================
# 安全配置
# ============================================
ssl = on
ssl_cert_file = '/etc/ssl/postgresql/server.crt'
ssl_key_file = '/etc/ssl/postgresql/server.key'
ssl_ca_file = '/etc/ssl/postgresql/ca.crt'
ssl_min_protocol_version = 'TLSv1.2'

# ============================================
# 认证配置
# ============================================
password_encryption = scram-sha-256

# ============================================
# 自动清理 (副本节点)
# ============================================
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# ============================================
# 统计信息
# ============================================
stats_temp_directory = 'pg_stat_tmp'