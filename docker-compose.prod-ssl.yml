# 生产环境 HTTPS Docker Compose 配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.prod-ssl.yml up -d
#
# 注意：基础 docker-compose.yml 已将 PostgreSQL 和 Redis 端口绑定到 127.0.0.1
# 数据层端口不对外暴露，后端通过 Docker 内部网络访问

version: '3.8'

services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    environment:
      - NGINX_SSL_ENABLED=true
      - NGINX_HSTS_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    environment:
      - TLS_MODE=behind_proxy
      - FORCE_HTTPS_REDIRECT=true
      - CORS_ALLOWED_ORIGINS=https://industrial-ai.example.com,https://api.industrial-ai.example.com
      - SECURITY_HEADERS_ENABLED=true
      - HSTS_MAX_AGE=31536000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  industrial-ai-network:
    driver: bridge

volumes:
  ssl-data:
    driver: local