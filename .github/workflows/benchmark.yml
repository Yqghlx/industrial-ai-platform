name: Performance Benchmark

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'benchmarks/**'
  schedule:
    # Run benchmarks every Sunday at 4 AM UTC
    - cron: '0 4 * * 0'
  workflow_dispatch:

env:
  GO_VERSION: '1.25'

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bench
          POSTGRES_PASSWORD: bench
          POSTGRES_DB: industrial_ai_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js (for k6)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install k6
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v0.45.0/k6-v0.45.0-linux-amd64.tar.gz | tar xz
          sudo mv k6-v0.45.0-linux-amd64/k6 /usr/local/bin/

      - name: Build backend
        working-directory: backend
        run: |
          go build -o bin/server ./cmd/server

      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgres://bench:bench@localhost:5432/industrial_ai_bench?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: bench-secret-key
          PORT: 8080
        run: |
          chmod +x bin/server
          bin/server &
          sleep 10
          curl -f http://localhost:8080/health || exit 1

      - name: Run API load tests
        working-directory: benchmarks
        env:
          BASE_URL: http://localhost:8080
        run: |
          mkdir -p results
          k6 run --out json=results/api_load.json k6/api_load_test.js

      - name: Run WebSocket stress tests
        working-directory: benchmarks
        env:
          BASE_URL: http://localhost:8080
        run: |
          k6 run --out json=results/ws_stress.json k6/ws_stress_test.js

      - name: Generate benchmark report
        working-directory: benchmarks
        run: |
          python3 generate_report.py results > results/benchmark_report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/results/
          retention-days: 30

      - name: Create benchmark summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('benchmarks/results/benchmark_report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📊 Performance Benchmark Results\n\n${report}`
            });

  go-benchmarks:
    name: Go Performance Benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Go benchmarks
        working-directory: backend
        run: |
          go test -bench=. -benchmem -run=^$ ./... > benchmark_results.txt

      - name: Upload Go benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmark-results
          path: backend/benchmark_results.txt
          retention-days: 30

      - name: Compare with previous benchmark
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: backend/benchmark_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@yangqinggang-it'

  # Store benchmark data for historical comparison
  store-benchmark:
    name: Store Benchmark Data
    runs-on: ubuntu-latest
    needs: [benchmark, go-benchmarks]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Checkout benchmark-data branch
        uses: actions/checkout@v4
        with:
          ref: benchmark-data
          path: benchmark-data-repo

      - name: Store benchmark data
        run: |
          mkdir -p benchmark-data-repo/data
          DATE=$(date +%Y%m%d_%H%M%S)
          cp -r artifacts/* benchmark-data-repo/data/$DATE/

      - name: Commit benchmark data
        working-directory: benchmark-data-repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Add benchmark data for $DATE"
          git push origin benchmark-data