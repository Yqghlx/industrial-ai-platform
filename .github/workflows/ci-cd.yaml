name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Run tests
      working-directory: backend
      run: |
        go test ./... -v -coverprofile=coverage.out
        go tool cover -func=coverage.out
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: backend/coverage.out

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Backend
      uses: docker/build-push-action@v5
      with:
        context: backend
        push: true
        tags: industrial-ai/backend:${{ github.sha }}
    
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: frontend
        push: true
        tags: industrial-ai/frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure Kubernetes
      run: |
        kubectl config set-cluster k8s --server=${{ secrets.K8S_API_SERVER }}
        kubectl config set-credentials deploy --token=${{ secrets.K8S_TOKEN }}
        kubectl config set-context default --cluster=k8s --user=deploy
        kubectl config use-context default
    
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f kubernetes/backend-deployment.yaml
        kubectl set image deployment/backend backend=industrial-ai/backend:${{ github.sha }} -n industrial-ai
    
    - name: Verify deployment
      run: |
        kubectl rollout status deployment/backend -n industrial-ai --timeout=300s