name: Build and Deploy

on:
  # Disabled auto-trigger - enable when K8s cluster is ready
  # push:
  #   branches: [main]
  #   tags:
  #     - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.25'
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend

jobs:
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for artifact attestation
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      # Artifact attestation requires repository attestation settings
      # - name: Generate artifact attestation
      #   uses: actions/attest-build-provenance@v1
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
      #     subject-digest: ${{ steps.push.outputs.digest }}
      #     push-to-registry: true

  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for artifact attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=https://api.industrial-ai.example.com
          platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.industrial-ai.example.com
    steps:
      - name: Checkout deployment config
        uses: actions/checkout@v4
        with:
          repository: industrial-ai/deployment-config
          token: ${{ secrets.DEPLOY_TOKEN }}
          ref: main

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes credentials
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Update deployment images
        run: |
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:${{ github.sha }}
          kubectl rollout status deployment/backend -n staging
          kubectl rollout status deployment/frontend -n staging

      - name: Verify deployment
        run: |
          kubectl get pods -n staging
          kubectl wait --for=condition=ready pod -l app=backend -n staging --timeout=300s
          kubectl wait --for=condition=ready pod -l app=frontend -n staging --timeout=300s

      - name: Run smoke tests
        run: |
          curl -f https://staging.industrial-ai.example.com/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://industrial-ai.example.com
    steps:
      - name: Checkout deployment config
        uses: actions/checkout@v4
        with:
          repository: industrial-ai/deployment-config
          token: ${{ secrets.DEPLOY_TOKEN }}
          ref: main

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure Kubernetes credentials
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Create production deployment
        run: |
          # Blue-green deployment strategy
          kubectl apply -f production/backend.yaml
          kubectl apply -f production/frontend.yaml

          # Wait for rollout
          kubectl rollout status deployment/backend -n production --timeout=600s
          kubectl rollout status deployment/frontend -n production --timeout=600s

      - name: Verify production deployment
        run: |
          kubectl get pods -n production
          curl -f https://industrial-ai.example.com/health || exit 1

      - name: Notify deployment success
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'deployments'
          slack-message: |
            ✅ Production deployment successful
            Version: ${{ github.ref_name }}
            Time: ${{ github.event.head_commit.timestamp }}
            URL: https://industrial-ai.example.com
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Rollback deployment
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig
          kubectl rollout undo deployment/backend -n production
          kubectl rollout undo deployment/frontend -n production

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1
        with:
          channel-id: 'alerts'
          slack-message: |
            ⚠️ Production rollback executed
            Version: ${{ github.ref_name }}
            Reason: Deployment verification failed
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}