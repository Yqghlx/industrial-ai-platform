# 开发环境 HTTPS Docker Compose 配置
# 使用方式: docker-compose -f docker-compose.yml -f docker-compose.dev-ssl.yml up -d
# 前置条件: 运行 scripts/generate-dev-certs.sh 生成开发证书

version: '3.8'

services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./ssl/dev:/etc/nginx/ssl:ro  # 开发自签名证书
    environment:
      - NGINX_SSL_ENABLED=true
      - NGINX_DEV_MODE=true
    healthcheck:
      test: ["CMD", "curl", "-k", "https://localhost/nginx-health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    environment:
      - TLS_MODE=behind_proxy
      - FORCE_HTTPS_REDIRECT=false  # 开发环境不强制重定向
      - CORS_ALLOWED_ORIGINS=https://localhost:443,http://localhost:8080
      - SECURITY_HEADERS_ENABLED=true
      - DEV_MODE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  industrial-ai-network:
    driver: bridge